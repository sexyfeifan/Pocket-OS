<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pocket OS — 排期看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            beige: { 50: '#FAF7F2', 100: '#F0EDE6', 200: '#E8E4DC', 300: '#D5D0C6' },
            brand: { DEFAULT: '#B37D56', dark: '#9A6A45', light: '#C4956F' },
            coffee: { DEFAULT: '#4A3C31', light: '#A3968C' },
            sage: { bg: '#E2ECE9', text: '#5A7A75' },
            danger: { bg: '#FDF2F2', text: '#DF4D4D', border: '#FADBD8' },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #FAF7F2; color: #4A3C31; margin: 0; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D5D0C6; border-radius: 2px; }
    .gantt-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .gantt-sticky { position: sticky; left: 0; z-index: 10; }
    .gantt-row { position: relative; }
    .gantt-merged { position: absolute; top: 2px; z-index: 2; }
    @keyframes conflictPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .conflict-pulse { animation: conflictPulse 1.2s ease-in-out infinite; }
    .progress-bar { transition: width 0.4s ease; }
    .summary-card { transition: all 0.2s ease; }
    @media (max-width: 640px) {
      .gantt-merged { font-size: 9px !important; padding: 1px 3px !important; }
      .summary-card { padding: 12px !important; }
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- 头部 -->
  <header class="bg-white border-b border-beige-200 px-4 py-2.5 sm:px-6 sm:py-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <svg class="w-4 h-4 sm:w-5 sm:h-5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        <h1 class="text-base sm:text-lg font-bold text-coffee">Pocket OS</h1>
        <span class="text-xs text-coffee-light bg-beige-100 px-1.5 py-0.5 rounded hidden sm:inline">只读看板</span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="scrollToToday()" class="px-2.5 py-1 text-xs text-brand border border-brand rounded-full hover:bg-brand hover:text-white transition-colors">今天</button>
        <span id="last-refresh" class="text-xs text-coffee-light hidden sm:inline"></span>
      </div>
    </div>
  </header>

  <!-- 甘特图 -->
  <div class="p-3 sm:p-4">
    <div class="flex items-center justify-between mb-2 sm:mb-3">
      <div class="flex items-center gap-2">
        <h2 class="text-sm sm:text-lg font-semibold text-coffee">排期日历</h2>
        <span id="cal-range" class="text-xs text-coffee-light hidden sm:inline"></span>
      </div>
      <div id="gantt-legend" class="flex items-center gap-1.5 sm:gap-2 flex-wrap"></div>
    </div>
    <div id="gantt-scroll-wrapper" class="gantt-scroll bg-white rounded-lg sm:rounded-xl shadow-sm border border-beige-200">
      <div id="gantt-container"></div>
    </div>
    <p class="text-xs text-coffee-light mt-1.5 sm:hidden">← 左右滑动查看更多日期 →</p>
  </div>

  <!-- 选题概览 -->
  <div class="px-3 sm:px-4 pb-6">
    <div class="flex items-center justify-between mb-2 sm:mb-3">
      <h3 class="text-sm sm:text-base font-semibold text-coffee">选题概览</h3>
      <span class="text-xs text-coffee-light">按发布日期排序</span>
    </div>
    <div id="topic-summaries" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3 sm:gap-4"></div>
  </div>

  <script>
  const SUMMARY_KEYS = ['script', 'shoot', 'acopy', 'bcopy', 'publish'];
  let appState = { topics: [] };
  let ganttStartDate = null, ganttTotalDays = 0;
  const GANTT_INITIAL_DAYS = 90, GANTT_EXTEND_DAYS = 30;
  const isMobile = window.innerWidth < 640;
  const CELL_W = isMobile ? 56 : 80;
  const COL_W = isMobile ? 100 : 160;

  function fmtDate(d) { const date = d instanceof Date ? d : new Date(d + 'T00:00:00'); return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0'); }
  function addDays(dateStr, n) { const d = new Date(dateStr + 'T00:00:00'); d.setDate(d.getDate() + n); return fmtDate(d); }
  function daysBetween(a, b) { return Math.round((new Date(b + 'T00:00:00') - new Date(a + 'T00:00:00')) / 86400000); }
  function todayStr() { return fmtDate(new Date()); }
  function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str || ''; return div.innerHTML; }
  function shortDate(dateStr) { if (!dateStr) return '—'; const p = dateStr.split('-'); return parseInt(p[1]) + '/' + parseInt(p[2]); }

  function checkConflict(steps) {
    const today = todayStr();
    for (const step of steps) {
      if (!step.done && step.endDate < today) return { hasConflict: true, message: `「${step.name}」已过期`, stepKey: step.key };
    }
    return { hasConflict: false };
  }
  function calcProgress(t) {
    const allItems = [...(t.preparationTasks || []), ...(t.productionSteps || [])];
    if (!allItems.length) return 0;
    return Math.round(allItems.filter(i => i.done).length / allItems.length * 100);
  }
  function sortedTopics() { return [...appState.topics].sort((a, b) => (a.publishDate || 'z').localeCompare(b.publishDate || 'z')); }
  function getActiveSteps(topic) { return (topic.productionSteps || []).filter(s => !s.cleared); }

  async function loadData() {
    try {
      const res = await fetch('/api/data');
      if (res.ok) appState = await res.json();
    } catch (e) {}
    renderAll();
    const el = document.getElementById('last-refresh');
    if (el) el.textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  }

  function renderAll() { renderCalendar(); renderSummaries(); }

  function initGanttRange() {
    const today = new Date();
    ganttStartDate = new Date(today); ganttStartDate.setDate(today.getDate() - 30);
    ganttTotalDays = GANTT_INITIAL_DAYS;
  }
  function getGanttDates() {
    const dates = [];
    for (let i = 0; i < ganttTotalDays; i++) { const d = new Date(ganttStartDate); d.setDate(ganttStartDate.getDate() + i); dates.push(fmtDate(d)); }
    return dates;
  }
  function scrollToToday() {
    const wrapper = document.getElementById('gantt-scroll-wrapper');
    if (!wrapper) return;
    const idx = getGanttDates().indexOf(todayStr());
    if (idx >= 0) wrapper.scrollLeft = COL_W + idx * CELL_W - wrapper.clientWidth / 3;
  }
  function onGanttScroll() {
    const wrapper = document.getElementById('gantt-scroll-wrapper');
    if (!wrapper) return;
    if (wrapper.scrollLeft + wrapper.clientWidth > wrapper.scrollWidth - 200) {
      ganttTotalDays += GANTT_EXTEND_DAYS; renderCalendar(); wrapper.scrollLeft = wrapper.scrollLeft;
    }
    if (wrapper.scrollLeft < 200) {
      ganttTotalDays += GANTT_EXTEND_DAYS;
      ganttStartDate.setDate(ganttStartDate.getDate() - GANTT_EXTEND_DAYS);
      renderCalendar(); wrapper.scrollLeft = GANTT_EXTEND_DAYS * CELL_W + wrapper.scrollLeft;
    }
    updateRange();
  }
  function updateRange() {
    const dates = getGanttDates();
    const el = document.getElementById('cal-range');
    if (el && dates.length) el.textContent = `${dates[0]} — ${dates[dates.length-1]}`;
  }

  function buildMergedBlocks(steps, dates) {
    const blocks = [];
    const todayFmt = todayStr();
    steps.forEach(step => {
      let mergeStart = null;
      for (let i = 0; i < dates.length; i++) {
        const d = dates[i];
        const inRange = d >= step.startDate && d <= (step.endDate || step.startDate);
        if (inRange && mergeStart === null) mergeStart = i;
        if ((!inRange || i === dates.length - 1) && mergeStart !== null) {
          const endIdx = inRange ? i : i - 1;
          blocks.push({ step, startIdx: mergeStart, endIdx, conflict: step.endDate < todayFmt && !step.done, lane: 0 });
          mergeStart = null;
        }
      }
    });
    blocks.sort((a, b) => a.startIdx - b.startIdx || a.endIdx - b.endIdx);
    const lanes = [];
    blocks.forEach(block => {
      let placed = false;
      for (let l = 0; l < lanes.length; l++) {
        if (block.startIdx > lanes[l]) { lanes[l] = block.endIdx; block.lane = l; placed = true; break; }
      }
      if (!placed) { block.lane = lanes.length; lanes.push(block.endIdx); }
    });
    blocks.maxLanes = lanes.length || 1;
    return blocks;
  }

  function renderCalendar() {
    if (!ganttStartDate) initGanttRange();
    const container = document.getElementById('gantt-container');
    const dates = getGanttDates();
    const todayFmt = todayStr();
    const defs = getActiveSteps(appState.topics[0] || {}).map(s => ({ key: s.key, name: s.name, color: s.color })) || [];
    const legend = document.getElementById('gantt-legend');
    legend.innerHTML = (isMobile ? '' : '<span class="text-xs text-coffee-light">图例：</span>') + defs.map(s => `<span class="inline-flex items-center gap-1 text-xs"><span class="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded" style="background:${s.color}"></span>${isMobile?'':'<span>'+s.name+'</span>'}</span>`).join('');
    updateRange();

    let html = '<table class="border-collapse" style="min-width:' + (COL_W + dates.length * CELL_W) + 'px">';
    html += '<thead><tr><th class="gantt-sticky bg-beige-50 p-1.5 sm:p-2 text-xs text-coffee-light text-left border-b border-r border-beige-200" style="min-width:' + COL_W + 'px;width:' + COL_W + 'px">选题</th>';
    dates.forEach(d => {
      const isToday = d === todayFmt;
      const dow = new Date(d+'T00:00:00').getDay();
      const isWe = dow === 0 || dow === 6;
      const isFirst = d.endsWith('-01');
      html += `<th class="p-0.5 sm:p-1 text-center border-b border-beige-200 ${isToday?'bg-brand/10':isWe?'bg-gray-50':''}" style="min-width:${CELL_W}px">
        ${isFirst && !isMobile?'<div class="text-xs text-brand font-medium">'+d.slice(0,7)+'</div>':''}
        <div class="text-xs text-coffee-light">${isMobile?['日','一','二','三','四','五','六'][dow]:['日','一','二','三','四','五','六'][dow]}</div>
        <div class="text-xs font-medium ${isToday?'text-brand':'text-coffee'}">${d.slice(8)}</div>
      </th>`;
    });
    html += '</tr></thead><tbody>';

    sortedTopics().forEach(topic => {
      const progress = calcProgress(topic);
      const conflict = checkConflict(getActiveSteps(topic));
      const blocks = buildMergedBlocks(getActiveSteps(topic), dates);

      html += `<tr><td class="gantt-sticky bg-white p-1.5 sm:p-2 border-b border-r border-beige-200" style="min-width:${COL_W}px;width:${COL_W}px">
        <div class="flex items-center gap-1">${conflict.hasConflict?'<svg class="w-3 h-3 sm:w-3.5 sm:h-3.5 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>':''}<span class="text-xs sm:text-sm font-medium truncate">${escapeHtml(topic.title)}</span></div>
        <div class="text-xs text-coffee-light mt-0.5">${progress}%</div>
        ${topic.publishDate ? `<div class="text-xs text-brand font-medium mt-0.5">发布 ${shortDate(topic.publishDate)}</div>` : ''}</td>`;

      html += `<td colspan="${dates.length}" class="border-b border-beige-200 p-0">`;
      const ROW_BASE = isMobile ? 40 : 52;
      const LANE_H = isMobile ? 20 : 26;
      const rowH = Math.max(ROW_BASE, blocks.maxLanes * LANE_H + 4);
      html += `<div class="gantt-row" style="width:${dates.length * CELL_W}px;height:${rowH}px">`;

      dates.forEach((d, i) => {
        const isToday = d === todayFmt;
        const dow = new Date(d+'T00:00:00').getDay();
        const isWe = dow === 0 || dow === 6;
        html += `<div class="absolute ${isToday?'bg-brand/5':isWe?'bg-gray-50/50':''}" style="left:${i*CELL_W}px;top:0;width:${CELL_W}px;height:${rowH}px;border-right:1px solid #EFECE6"></div>`;
      });

      blocks.forEach(b => {
        const left = b.startIdx * CELL_W + 2;
        const width = (b.endIdx - b.startIdx + 1) * CELL_W - 4;
        const top = b.lane * LANE_H + 2;
        html += `<div class="gantt-merged rounded px-1 sm:px-1.5 flex items-center text-xs font-medium truncate ${b.conflict?'conflict-pulse':''}" style="left:${left}px;width:${width}px;top:${top}px;height:${LANE_H - 4}px;background:${b.step.color}${b.step.done?'88':''};${b.step.done?'text-decoration:line-through':''}" title="${b.step.name} (${b.step.startDate} ~ ${b.step.endDate})">
          <span class="flex-1 truncate">${b.step.name}</span>
        </div>`;
      });

      html += '</div></td></tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;

    const wrapper = document.getElementById('gantt-scroll-wrapper');
    if (wrapper && !wrapper._scrollBound) { wrapper.addEventListener('scroll', onGanttScroll); wrapper._scrollBound = true; }
  }

  // ── 选题概览 ──
  function renderSummaries() {
    const el = document.getElementById('topic-summaries');
    if (!appState.topics.length) { el.innerHTML = '<p class="text-xs text-coffee-light col-span-full text-center py-8">暂无选题</p>'; return; }
    el.innerHTML = sortedTopics().map(topic => {
      const progress = calcProgress(topic);
      const conflict = checkConflict(topic.productionSteps || []);
      const pubDate = topic.publishDate || '';
      const daysLeft = pubDate ? daysBetween(todayStr(), pubDate) : null;
      const summarySteps = getActiveSteps(topic).filter(s => SUMMARY_KEYS.includes(s.key));
      const cb = topic.canboxImport;

      let html = `<div class="summary-card bg-white rounded-xl sm:rounded-2xl p-3 sm:p-5 shadow-sm border border-[#EFECE6] text-coffee flex flex-col gap-2 sm:gap-3">`;
      html += `<div class="flex items-start justify-between">
        <div class="flex-1 min-w-0">
          <span class="inline-block bg-sage-bg text-sage-text text-xs rounded px-1.5 sm:px-2 py-0.5 font-medium mb-1 sm:mb-1.5">${escapeHtml(topic.category || '内容')}</span>
          <h4 class="text-sm sm:text-base font-bold text-coffee truncate">${escapeHtml(topic.title)}</h4>
          ${(topic.platforms||[]).length ? `<div class="text-xs text-coffee-light mt-1 truncate">${topic.platforms.join(' · ')}</div>` : ''}
        </div>
        <div class="text-right flex-shrink-0 ml-2 sm:ml-3">
          <div class="text-xs text-coffee-light">发片时间</div>
          <div class="text-xl sm:text-2xl font-bold text-coffee leading-none">${pubDate ? shortDate(pubDate) : '—'}</div>
          ${daysLeft !== null ? (daysLeft > 0 ? `<div class="text-xs text-coffee-light mt-0.5">${daysLeft}天</div>` : (daysLeft === 0 ? '<div class="text-xs text-brand font-medium mt-0.5">今天</div>' : `<div class="text-xs text-danger-text font-medium mt-0.5">超${Math.abs(daysLeft)}天</div>`)) : ''}
        </div>
      </div>`;
      html += `<div class="flex items-center gap-2"><div class="flex-1 h-1.5 bg-beige-100 rounded-full overflow-hidden"><div class="h-1.5 rounded-full progress-bar" style="width:${progress}%;background:${progress===100?'#38A169':'#B37D56'}"></div></div><span class="text-xs text-coffee-light">${progress}%</span></div>`;
      html += `<div class="space-y-0.5 sm:space-y-1">`;
      summarySteps.forEach(step => {
        const isC = conflict.hasConflict && conflict.stepKey === step.key;
        html += `<div class="flex items-center gap-1.5 sm:gap-2 py-0.5 sm:py-1 px-0.5 sm:px-1 rounded ${isC?'bg-danger-bg':''}">
          <div class="w-3.5 h-3.5 sm:w-4 sm:h-4 rounded border-2 flex items-center justify-center flex-shrink-0 ${step.done?'border-green-500 bg-green-500':'border-beige-300'}">${step.done?'<svg class="w-2 h-2 sm:w-2.5 sm:h-2.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>':''}</div>
          <span class="text-xs ${step.done?'line-through text-coffee-light':'text-coffee'} flex-1 truncate">${step.name}</span>
          <span class="text-xs ${isC?'text-danger-text font-medium':'text-coffee-light'}">${shortDate(step.startDate)}</span>
        </div>`;
      });
      html += `</div>`;
      if (cb) {
        html += `<div class="text-xs text-coffee-light space-y-0.5 px-0.5 sm:px-1">`;
        if (cb.shootStart && cb.shootEnd) html += `<div class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full bg-[#A5C8E1] flex-shrink-0"></span><span class="text-coffee-light">拍摄段</span> <span class="font-medium text-coffee">${cb.segments && cb.segments.length > 1 ? cb.segments.map(s => s.start === s.end ? shortDate(s.start) : shortDate(s.start)+'~'+shortDate(s.end)).join(', ') : cb.shootStart + ' ~ ' + cb.shootEnd}</span></div>`;
        if (cb.location) html += `<div class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full bg-[#6BA3BE] flex-shrink-0"></span><span class="text-coffee-light">拍摄地</span> <span class="font-medium text-coffee">${escapeHtml(cb.location)}</span></div>`;
        if (cb.director) html += `<div class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full bg-[#E8A87C] flex-shrink-0"></span><span class="text-coffee-light">导演</span> <span class="font-medium text-coffee">${escapeHtml(cb.director)}</span></div>`;
        if (cb.photographer) html += `<div class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full bg-[#85CDCA] flex-shrink-0"></span><span class="text-coffee-light">摄影</span> <span class="font-medium text-coffee">${escapeHtml(cb.photographer)}</span></div>`;
        if (cb.production) html += `<div class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full bg-[#D5A5E1] flex-shrink-0"></span><span class="text-coffee-light">制片</span> <span class="font-medium text-coffee">${escapeHtml(cb.production)}</span></div>`;
        if (cb.rd) html += `<div class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full bg-[#A3D9A5] flex-shrink-0"></span><span class="text-coffee-light">研发</span> <span class="font-medium text-coffee">${escapeHtml(cb.rd)}</span></div>`;
        if (cb.business) html += `<div class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full bg-[#F2D98B] flex-shrink-0"></span><span class="text-coffee-light">商务</span> <span class="font-medium text-coffee">${escapeHtml(cb.business)}</span></div>`;
        if (cb.audio) html += `<div class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full bg-[#E1A5A5] flex-shrink-0"></span><span class="text-coffee-light">收音</span> <span class="font-medium text-coffee">${escapeHtml(cb.audio)}</span></div>`;
        if (cb.operational) html += `<div class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full bg-[#B8D4E3] flex-shrink-0"></span><span class="text-coffee-light">运营</span> <span class="font-medium text-coffee">${escapeHtml(cb.operational)}</span></div>`;
        if (cb.laodao) html += `<div class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full bg-[#B37D56] flex-shrink-0"></span><span class="font-medium text-brand">老刀出镜</span></div>`;
        if (cb.advertiserNo) html += `<div class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full bg-[#D4A574] flex-shrink-0"></span><span class="text-coffee-light">商单</span> <span class="font-medium text-coffee">${escapeHtml(cb.advertiserNo)}</span></div>`;
        html += `</div>`;
      }
      if (conflict.hasConflict) html += `<div class="text-xs text-danger-text bg-danger-bg rounded px-1.5 sm:px-2 py-1 sm:py-1.5 border border-danger-border">有任务已过期</div>`;
      html += '</div>';
      return html;
    }).join('');
  }

  loadData().then(() => setTimeout(scrollToToday, 100));
  let refreshTimer = setInterval(loadData, 60000);
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { clearInterval(refreshTimer); refreshTimer = null; }
    else { if (!refreshTimer) refreshTimer = setInterval(loadData, 60000); loadData(); }
  });
  </script>
</body>
</html>
